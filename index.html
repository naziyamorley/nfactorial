<!doctype html>
<html lang="ru">
  <head>
    <script>
      // Apply theme before render to avoid flash
      (function () {
        var t = localStorage.getItem("chessy_theme") || "light";
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FFF3E1" />
    <meta
      name="theme-color"
      content="#15131A"
      media="(prefers-color-scheme: dark)"
    />
    <title>Chessy — современные шахматы для Казахстана</title>
    <meta
      name="description"
      content="RPG-шахматы для Казахстана. AI-тренер, школьный кабинет, рейтинг по городам, карта клубов."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700;900&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
